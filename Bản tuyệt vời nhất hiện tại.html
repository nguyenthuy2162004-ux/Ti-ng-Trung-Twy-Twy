<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chinh Phục Tiếng Trung cùng Cô Twy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fff5f7; font-family: sans-serif; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 1.5rem; }
        .tab-btn { padding: 10px; cursor: pointer; border-bottom: 3px solid transparent; color: #4b5563; font-size: 0.8rem; }
        .tab-btn.active { border-bottom: 3px solid #db2777; color: #db2777; font-weight: bold; }
        .correct { background-color: #22c55e !important; color: white !important; }
        .wrong { background-color: #ef4444 !important; color: white !important; }
        .flip-card { perspective: 1000px; width: 100%; height: 250px; cursor: pointer; }
        .flipper { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flipper { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #fbcfe8; border-radius: 1rem; background: white; padding: 10px; }
        .back { transform: rotateY(180deg); }
    </style>
</head>
<body class="p-4">
    <div id="overlay" class="fixed inset-0 bg-pink-100 flex items-center justify-center z-50">
        <button onclick="initApp()" class="bg-pink-600 text-white p-10 rounded-full text-2xl font-bold shadow-xl animate-pulse">BẮT ĐẦU HỌC</button>
    </div>

    <div id="app" class="max-w-4xl mx-auto hidden">
        <header class="bg-pink-600 text-white p-6 rounded-2xl shadow-lg mb-6 text-center">
            <h1 class="text-2xl font-bold">Chinh phục tiếng Trung cùng Cô Twy</h1>
            <p class="font-bold">Liên hệ: 0382644158</p>
        </header>
        <div id="home-view" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        <div id="lesson-view" class="hidden">
            <button onclick="location.reload()" class="font-bold text-pink-700 mb-4">← Quay lại trang chủ</button>
            <h2 id="lesson-title" class="text-xl font-bold text-center my-4 text-pink-900"></h2>
            <div id="tabs" class="flex gap-1 border-b justify-center pb-2 overflow-x-auto text-sm">
                <button class="tab-btn active" onclick="setTab('flashcard')">Flashcard</button>
                <button class="tab-btn" onclick="setTab('quiz')">Ôn tập</button>
                <button class="tab-btn" onclick="setTab('listen')">Nghe</button>
                <button class="tab-btn" onclick="setTab('trans')">Dịch</button>
                <button class="tab-btn" onclick="setTab('vocab')">Từ vựng</button>
                <button class="tab-btn" onclick="setTab('exam')">Bài thi</button>
            </div>
            <div id="tab-content" class="card mt-6 min-h-[350px]"></div>
        </div>
    </div>

    <script>
        let audioCtx;
        function initApp() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); document.getElementById('overlay').style.display='none'; document.getElementById('app').classList.remove('hidden'); renderHome(); }
        function playSound(isCorrect) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = isCorrect ? 880 : 220; gain.gain.value = 0.1; osc.start(); osc.stop(audioCtx.currentTime + 0.3); }

        const db = {
            1: {t: "Bài 1: 你好", v: [{h:"你",p:"nǐ",v:"bạn"}, {h:"您",p:"nín",v:"ngài"}, {h:"你们",p:"nǐmen",v:"các bạn"}, {h:"对不起",p:"duìbuqǐ",v:"xin lỗi"}, {h:"没关系",p:"méiguānxi",v:"không sao"}]},
            2: {t: "Bài 2: 谢谢", v: [{h:"谢谢",p:"xièxie",v:"cảm ơn"}, {h:"不",p:"bù",v:"không"}, {h:"不客气",p:"bú kèqi",v:"không có gì"}, {h:"再见",p:"zàijiàn",v:"tạm biệt"}]},
            3: {t: "Bài 3: 你叫什么名字", v: [{h:"叫",p:"jiào",v:"gọi là"}, {h:"什么",p:"shénme",v:"cái gì"}, {h:"名字",p:"míngzi",v:"tên"}, {h:"我",p:"wǒ",v:"tôi"}, {h:"是",p:"shì",v:"là"}, {h:"老师",p:"lǎoshī",v:"giáo viên"}, {h:"吗",p:"ma",v:"phải không"}, {h:"学生",p:"xuésheng",v:"học sinh"}, {h:"人",p:"rén",v:"người"}, {h:"中国",p:"Zhōngguó",v:"Trung Quốc"}, {h:"美国",p:"Měiguó",v:"Mỹ"}]},
            4: {t: "Bài 4: 她是我的汉语老师", v: [{h:"她",p:"tā",v:"cô ấy"}, {h:"谁",p:"shéi",v:"ai"}, {h:"的",p:"de",v:"của"}, {h:"汉语",p:"Hànyǔ",v:"tiếng Hán"}, {h:"哪",p:"nǎ",v:"nào"}, {h:"国",p:"guó",v:"nước"}, {h:"呢",p:"ne",v:"trợ từ nghi vấn"}, {h:"他",p:"tā",v:"anh ấy"}, {h:"同学",p:"tóngxué",v:"bạn học"}, {h:"朋友",p:"péngyou",v:"bạn bè"}]},
            5: {t: "Bài 5: 你家有几口人", v: [{h:"家",p:"jiā",v:"nhà"}, {h:"有",p:"yǒu",v:"có"}, {h:"口",p:"kǒu",v:"người (gia đình)"}, {h:"女儿",p:"nǚ'ér",v:"con gái"}, {h:"几",p:"jǐ",v:"mấy"}, {h:"岁",p:"suì",v:"tuổi"}, {h:"了",p:"le",v:"rồi"}, {h:"今年",p:"jīnnián",v:"năm nay"}, {h:"多",p:"duō",v:"nhiều / bao nhiêu"}, {h:"大",p:"dà",v:"lớn"}]},
            6: {t: "Bài 6: 我会说汉语", v: [{h:"会",p:"huì",v:"biết, có thể"}, {h:"说",p:"shuō",v:"nói"}, {h:"妈妈",p:"māma",v:"mẹ"}, {h:"菜",p:"cài",v:"món ăn"}, {h:"很",p:"hěn",v:"rất"}, {h:"好吃",p:"hǎochī",v:"ngon"}, {h:"做",p:"zuò",v:"làm, nấu"}, {h:"写",p:"xiě",v:"viết"}, {h:"汉字",p:"Hànzì",v:"chữ Hán"}, {h:"字",p:"zì",v:"chữ"}, {h:"怎么",p:"zěnme",v:"như thế nào"}, {h:"读",p:"dú",v:"đọc"}]},
            7: {t: "Bài 7: 今天几号", v: [{h:"请",p:"qǐng",v:"mời, xin"}, {h:"问",p:"wèn",v:"hỏi"}, {h:"今天",p:"jīntiān",v:"hôm nay"}, {h:"号",p:"hào",v:"ngày"}, {h:"月",p:"yuè",v:"tháng"}, {h:"星期",p:"xīngqī",v:"tuần, thứ"}, {h:"昨天",p:"zuótiān",v:"hôm qua"}, {h:"明天",p:"míngtiān",v:"ngày mai"}, {h:"去",p:"qù",v:"đi"}, {h:"学校",p:"xuéxiào",v:"trường học"}, {h:"看",p:"kàn",v:"xem"}, {h:"书",p:"shū",v:"sách"}]},
            8: {t: "Bài 8: 我想喝茶", v: [{h:"想",p:"xiǎng",v:"muốn"}, {h:"喝",p:"hē",v:"uống"}, {h:"茶",p:"chá",v:"trà"}, {h:"吃",p:"chī",v:"ăn"}, {h:"米饭",p:"mǐfàn",v:"cơm"}, {h:"下午",p:"xiàwǔ",v:"buổi chiều"}, {h:"商店",p:"shāngdiàn",v:"cửa hàng"}, {h:"买",p:"mǎi",v:"mua"}, {h:"个",p:"gè",v:"cái"}, {h:"杯子",p:"bēizi",v:"cốc"}, {h:"这",p:"zhè",v:"này"}, {h:"多少",p:"duōshao",v:"bao nhiêu"}, {h:"钱",p:"qián",v:"tiền"}, {h:"块",p:"kuài",v:"đồng"}, {h:"那",p:"nà",v:"kia"}]},
            9: {t: "Bài 9: 你儿子在哪儿工作", v: [{h:"小",p:"xiǎo",v:"nhỏ"}, {h:"猫",p:"māo",v:"mèo"}, {h:"在",p:"zài",v:"ở"}, {h:"那儿",p:"nàr",v:"ở kia"}, {h:"狗",p:"gǒu",v:"chó"}, {h:"椅子",p:"yǐzi",v:"ghế"}, {h:"下面",p:"xiàmiàn",v:"phía dưới"}, {h:"哪儿",p:"nǎr",v:"ở đâu"}, {h:"工作",p:"gōngzuò",v:"công việc, làm việc"}, {h:"儿子",p:"érzi",v:"con trai"}, {h:"医院",p:"yīyuàn",v:"bệnh viện"}, {h:"医生",p:"yīshēng",v:"bác sĩ"}, {h:"爸爸",p:"bàba",v:"bố"}]},
            10: {t: "Bài 10: 我能坐这儿吗", v: [{h:"桌子",p:"zhuōzi",v:"bàn"}, {h:"上",p:"shàng",v:"trên"}, {h:"电脑",p:"diànnǎo",v:"máy tính"}, {h:"和",p:"hé",v:"và"}, {h:"本",p:"běn",v:"quyển"}, {h:"里",p:"lǐ",v:"trong"}, {h:"前面",p:"qiánmiàn",v:"phía trước"}, {h:"后面",p:"hòumiàn",v:"phía sau"}, {h:"这儿",p:"zhèr",v:"ở đây"}, {h:"没有",p:"méiyǒu",v:"không có, chưa"}, {h:"能",p:"néng",v:"có thể"}, {h:"坐",p:"zuò",v:"ngồi"}, {h:"王芳",p:"Wáng Fāng",v:"Vương Phương"}, {h:"谢鹏",p:"Xiè Péng",v:"Tạ Bằng"}]},
            11: {t: "Bài 11: 现在几点", v: [{h:"现在",p:"xiànzài",v:"bây giờ"}, {h:"点",p:"diǎn",v:"giờ"}, {h:"分",p:"fēn",v:"phút"}, {h:"中午",p:"zhōngwǔ",v:"buổi trưa"}, {h:"吃饭",p:"chīfàn",v:"ăn cơm"}, {h:"时候",p:"shíhou",v:"lúc"}, {h:"回",p:"huí",v:"về"}, {h:"我们",p:"wǒmen",v:"chúng tôi"}, {h:"电影",p:"diànyǐng",v:"phim"}, {h:"住",p:"zhù",v:"ở"}, {h:"前",p:"qián",v:"trước"}, {h:"北京",p:"Běijīng",v:"Bắc Kinh"}]},
            12: {t: "Bài 12: 明天天气怎么样", v: [{h:"天气",p:"tiānqì",v:"thời tiết"}, {h:"怎么样",p:"zěnmeyàng",v:"thế nào"}, {h:"太",p:"tài",v:"quá"}, {h:"太……了",p:"tài...le",v:"quá...rồi"}, {h:"热",p:"rè",v:"nóng"}, {h:"冷",p:"lěng",v:"lạnh"}, {h:"下雨",p:"xiàyǔ",v:"mưa"}, {h:"下",p:"xià",v:"rơi"}, {h:"雨",p:"yǔ",v:"mưa"}, {h:"小姐",p:"xiǎojiě",v:"cô"}, {h:"来",p:"lái",v:"đến"}, {h:"身体",p:"shēntǐ",v:"cơ thể"}, {h:"爱",p:"ài",v:"yêu, thích"}, {h:"些",p:"xiē",v:"một vài"}, {h:"水果",p:"shuǐguǒ",v:"trái cây"}, {h:"水",p:"shuǐ",v:"nước"}]},
            13: {t: "Bài 13: 他在学做中国菜", v: [{h:"喂",p:"wèi",v:"alo"}, {h:"也",p:"yě",v:"cũng"}, {h:"学习",p:"xuéxí",v:"học tập"}, {h:"上午",p:"shàngwǔ",v:"buổi sáng"}, {h:"睡觉",p:"shuìjiào",v:"ngủ"}, {h:"电视",p:"diànshì",v:"tivi"}, {h:"喜欢",p:"xǐhuan",v:"thích"}, {h:"给",p:"gěi",v:"cho"}, {h:"打电话",p:"dǎ diànhuà",v:"gọi điện"}, {h:"吧",p:"ba",v:"nhé"}]},
            14: {t: "Bài 14: 她买了不少衣服", v: [{h:"东西",p:"dōngxi",v:"đồ vật"}, {h:"一点儿",p:"yìdiǎnr",v:"một chút"}, {h:"苹果",p:"píngguǒ",v:"táo"}, {h:"看见",p:"kànjiàn",v:"nhìn thấy"}, {h:"先生",p:"xiānsheng",v:"ông"}, {h:"开",p:"kāi",v:"mở, lái"}, {h:"车",p:"chē",v:"xe"}, {h:"回来",p:"huílai",v:"quay lại"}, {h:"分钟",p:"fēnzhōng",v:"phút"}, {h:"后",p:"hòu",v:"sau"}, {h:"衣服",p:"yīfu",v:"quần áo"}, {h:"漂亮",p:"piàoliang",v:"đẹp"}, {h:"啊",p:"a",v:"à"}, {h:"少",p:"shǎo",v:"ít"}, {h:"不少",p:"bù shǎo",v:"không ít"}, {h:"这些",p:"zhèxiē",v:"những cái này"}, {h:"都",p:"dōu",v:"đều"}]},
            15: {t: "Bài 15: 我是坐飞机来的", v: [{h:"认识",p:"rènshi",v:"quen biết"}, {h:"年",p:"nián",v:"năm"}, {h:"大学",p:"dàxué",v:"đại học"}, {h:"饭店",p:"fàndiàn",v:"nhà hàng"}, {h:"出租车",p:"chūzūchē",v:"taxi"}, {h:"一起",p:"yìqǐ",v:"cùng nhau"}, {h:"高兴",p:"gāoxìng",v:"vui mừng"}, {h:"听",p:"tīng",v:"nghe"}, {h:"飞机",p:"fēijī",v:"máy bay"}]}
        };

        let curId=1, curI=0, curT='flashcard';
        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='zh-CN'; window.speechSynthesis.speak(u); }
        function renderHome() { document.getElementById('home-view').innerHTML = Object.keys(db).map(id => `<div class="card cursor-pointer border hover:shadow-lg font-bold text-center" onclick="openL(${id})">${db[id].t}</div>`).join(''); }
        function openL(id) { curId=id; document.getElementById('home-view').classList.add('hidden'); document.getElementById('lesson-view').classList.remove('hidden'); document.getElementById('lesson-title').innerText=db[id].t; render(); }
        function setTab(t) { curT=t; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.innerText.toLowerCase()==t.toLowerCase())); render(); }
        function render() {
            const v = db[curId].v, i = v[curI], div = document.getElementById('tab-content');
            if(curT==='flashcard') div.innerHTML = `<div class="flip-card mx-auto" onclick="this.classList.toggle('flipped')"><div class="flipper"><div class="front text-5xl font-bold">${i.h}</div><div class="back text-xl font-bold">${i.p}<br>${i.v}</div></div></div><button class="block w-full mt-4 bg-pink-100 p-2 rounded" onclick="speak('${i.h}')">🔊 Nghe</button>`;
            else if(curT==='quiz') div.innerHTML = `<h2 class="text-3xl text-center">${i.h}</h2><div class="grid gap-2 mt-4">${[...v.filter(x=>x.v!=i.v).slice(0,3), i].sort(()=>Math.random()-0.5).map(o=>`<button class="p-3 border rounded" onclick="checkBtn(this, '${o.v}','${i.v}')">${o.v}</button>`).join('')}</div>`;
            else if(curT==='listen') div.innerHTML = `<div class="text-center"><button class="text-6xl" onclick="speak('${i.h}')">🔊</button><input id="a-l" class="border p-2 w-full mt-4"><button class="bg-pink-600 text-white w-full p-2 mt-2" onclick="checkInput('a-l','${i.h}')">Kiểm tra</button></div>`;
            else if(curT==='trans') div.innerHTML = `<h2 class="text-xl text-center">${i.v}</h2><input id="a-t" class="border p-2 w-full mt-4"><button class="bg-pink-600 text-white w-full p-2 mt-2" onclick="checkInput('a-t','${i.h}')">Kiểm tra</button>`;
            else if(curT==='vocab') div.innerHTML = `<table class="w-full text-center"><thead><tr><th>Hán</th><th>Pinyin</th><th>Nghĩa</th></tr></thead>${v.map(x=>`<tr><td class="border p-2">${x.h}</td><td class="border p-2">${x.p}</td><td class="border p-2">${x.v}</td></tr>`).join('')}</table>`;
            else { const all = []; for(let k=1; k<=curId; k++) all.push(...db[k].v); div.innerHTML = `<div class='text-center font-bold mb-4'>Bài thi (Bài 1-${curId})</div>` + all.sort(()=>Math.random()-0.5).slice(0,10).map((item,idx)=>`<div class='mb-2'>${item.v} <input class='ex border w-full p-1' data-h='${item.h}'></div>`).join('') + `<button class='bg-pink-600 text-white w-full mt-4 p-2' onclick='grade()'>Nộp bài</button><div id='r'></div>`; }
            if(curT!=='vocab' && curT!=='exam') div.innerHTML += `<div class="flex justify-center gap-4 mt-6"><button onclick="move(-1)">←</button><button onclick="move(1)">→</button></div>`;
        }
        function checkBtn(btn, val, ans) { const c = val==ans; btn.className = c ? 'p-3 border rounded correct' : 'p-3 border rounded wrong'; playSound(c); }
        function checkInput(id, ans) { const v = document.getElementById(id).value; const c = v==ans; document.getElementById(id).className = c ? 'correct border p-2 w-full mt-4' : 'wrong border p-2 w-full mt-4'; playSound(c); }
        function move(d) { curI = (curI + d + db[curId].v.length) % db[curId].v.length; render(); }
        function grade() { let s=0; document.querySelectorAll('.ex').forEach(i=>{if(i.value==i.dataset.h){i.classList.add('correct');s++}else i.classList.add('wrong')}); document.getElementById('r').innerText="Kết quả: "+s+"/10"; }
        renderHome();
    </script>
</body>
</html>
